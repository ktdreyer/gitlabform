name: Docs

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      BRANCH_REF:
        type: string
        required: true

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.BRANCH_REF || github.ref }}
          fetch-depth: 2
      - name: Configure uv environment
        uses: ./.github/actions/setup-uv-local
      - name: Setup Python ${{ env.UV_PYTHON }} and install dependencies
        run: |
          uv sync --frozen --no-dev --group docs
      - name: Build documentation
        run: |
          uv run --no-sync docs build
      - name: Check links
        run: |
          uv tool install linkchecker
          linkchecker site/index.html --check-extern
